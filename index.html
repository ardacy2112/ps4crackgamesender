<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 PKG Sender</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin-top:120px;
}

input{
width:400px;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>PS4 PKG Sender</h1>

<input id="ip" placeholder="PS4 IP Address"><br>
<input id="pkg" placeholder="PKG Direct Link"><br>

<button onclick="sendPkg()">Send PKG</button>

<p id="status"></p>

<script>

async function sendPkg(){

let ip = document.getElementById("ip").value
let pkg = document.getElementById("pkg").value

let res = await fetch("http://localhost:3000/send",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
ip:ip,
pkg:pkg
})
})

let text = await res.text()

document.getElementById("status").innerText = text

}

</script>

</body>
</html>
